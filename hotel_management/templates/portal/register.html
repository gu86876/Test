{% extends "portal/base.html" %}
{% block title %}注册 - 云璟国际酒店{% endblock %}
{% block content %}
<div class="login-card">
    <h2><i class="bi bi-person-plus"></i> 会员注册</h2>
    <form method="post">{% csrf_token %}
        <div class="form-group"><label class="form-label">姓名</label><input type="text" name="name" class="form-control" placeholder="请输入姓名" required></div>
        <div class="form-group"><label class="form-label">手机号</label><input type="text" name="phone" class="form-control" placeholder="请输入手机号" required></div>
        <div class="form-group"><label class="form-label">密码</label><input type="password" name="password" class="form-control" placeholder="至少6位" required minlength="6"></div>
        <div class="form-group"><label class="form-label">确认密码</label><input type="password" name="password2" class="form-control" placeholder="再次输入密码" required></div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:15px;margin-top:8px"><i class="bi bi-check-lg"></i> 注册</button>
    </form>
    <div style="text-align:center;margin-top:20px;font-size:14px;color:#64748b">
        已有账号？<a href="{% url 'portal:login' %}" style="color:var(--gold)">立即登录</a>
    </div>
</div>
{% endblock %}
