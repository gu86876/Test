{% extends 'base.html' %}
{% block title %}办理入住{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="bi bi-door-open"></i> 办理入住</h1>
    <a href="{% url 'bookings:check_in_walk_in' %}" class="btn btn-success"><i class="bi bi-person-plus"></i> 散客入住</a>
</div>
<div class="card"><div class="card-body">
<form method="post">{% csrf_token %}
<div class="form-row">
{% for field in form %}
<div class="form-group"><label class="form-label">{{ field.label }}</label>{{ field }}</div>
{% endfor %}
</div>
<div style="margin-top:20px">
    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 办理入住</button>
</div>
</form></div></div>
{% endblock %}
