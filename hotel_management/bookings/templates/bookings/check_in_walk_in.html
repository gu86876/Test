{% extends 'base.html' %}
{% block title %}散客入住{% endblock %}
{% block content %}
<div class="page-header"><h1><i class="bi bi-person-plus"></i> 散客入住</h1></div>
<div class="grid-2">
<div class="card"><div class="card-header">客户信息</div><div class="card-body">
<form method="post">{% csrf_token %}
<div class="form-row">
{% for field in form %}
<div class="form-group"><label class="form-label">{{ field.label }}</label>{{ field }}</div>
{% endfor %}
</div>
</div></div>
<div class="card"><div class="card-header">选择房间与入住信息</div><div class="card-body">
<div class="form-group"><label class="form-label">选择房间</label>
<select name="room_id" class="form-control" required>
    <option value="">请选择房间</option>
    {% for r in rooms %}
    <option value="{{ r.pk }}">{{ r.room_number }} ({{ r.room_type.name }} ¥{{ r.current_price }})</option>
    {% endfor %}
</select></div>
<div class="form-group"><label class="form-label">离店日期</label>
<input type="date" name="check_out_date" class="form-control" required></div>
<div class="form-row">
<div class="form-group"><label class="form-label">押金</label>
<input type="number" name="deposit" class="form-control" step="0.01" value="0"></div>
<div class="form-group"><label class="form-label">房卡号</label>
<input type="text" name="key_card" class="form-control"></div>
</div>
<div style="margin-top:16px"><button type="submit" class="btn btn-primary">确认入住</button>
<a href="{% url 'bookings:check_in' %}" class="btn btn-outline">返回</a></div>
</form></div></div>
</div>
{% endblock %}
