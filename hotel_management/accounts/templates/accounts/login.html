{% extends 'base.html' %}
{% block title %}登录 - 酒店管理系统{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-card">
        <h2><i class="bi bi-building"></i> 酒店管理系统</h2>
        <p class="subtitle">请登录您的账户</p>

        {% if form.errors %}
        <div class="alert alert-error">
            <i class="bi bi-exclamation-circle"></i> 用户名或密码错误
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label"><i class="bi bi-person"></i> 用户名</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label class="form-label"><i class="bi bi-lock"></i> 密码</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:16px;">
                <i class="bi bi-box-arrow-in-right"></i> 登 录
            </button>
        </form>
    </div>
</div>
{% endblock %}
