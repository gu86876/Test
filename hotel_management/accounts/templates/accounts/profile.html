{% extends 'base.html' %}
{% block title %}个人中心{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="bi bi-person-circle"></i> 个人中心</h1>
</div>
<div class="card">
    <div class="card-header">账户信息</div>
    <div class="card-body">
        <div class="form-row">
            <div class="form-group"><label class="form-label">用户名</label><div class="form-control" style="background:#f8fafc">{{ user.username }}</div></div>
            <div class="form-group"><label class="form-label">邮箱</label><div class="form-control" style="background:#f8fafc">{{ user.email|default:"未设置" }}</div></div>
            <div class="form-group"><label class="form-label">角色</label><div class="form-control" style="background:#f8fafc">{{ user.profile.role.name|default:"未分配" }}</div></div>
            <div class="form-group"><label class="form-label">手机号</label><div class="form-control" style="background:#f8fafc">{{ user.profile.phone|default:"未设置" }}</div></div>
        </div>
    </div>
</div>
{% endblock %}
