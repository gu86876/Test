{% extends 'base.html' %}
{% block title %}{{ action }}房间{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="bi bi-{% if action == '创建' %}plus-circle{% else %}pencil-square{% endif %}"></i> {{ action }}房间</h1>
</div>
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="form-row">
                {% for field in form %}
                <div class="form-group">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}<small style="color:var(--text-light)">{{ field.help_text }}</small>{% endif %}
                </div>
                {% endfor %}
            </div>
            <div style="margin-top:20px">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
                <a href="{% url 'rooms:room_grid' %}" class="btn btn-outline">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
