{% extends 'base.html' %}
{% block title %}房型管理{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="bi bi-tags"></i> 房型管理</h1>
    <a href="{% url 'rooms:room_type_create' %}" class="btn btn-primary"><i class="bi bi-plus-circle"></i> 添加房型</a>
</div>
<div class="card"><div class="card-body" style="padding:0">
<table class="table">
<thead><tr><th>名称</th><th>代码</th><th>基础价</th><th>周末价</th><th>容纳</th><th>床型</th><th>操作</th></tr></thead>
<tbody>
{% for t in types %}
<tr>
    <td><strong>{{ t.name }}</strong></td><td>{{ t.code }}</td>
    <td>¥{{ t.base_price }}</td><td>¥{{ t.weekend_price|default:0 }}</td>
    <td>{{ t.capacity }}人</td><td>{{ t.bed_type }}</td>
    <td><a href="{% url 'rooms:room_type_edit' t.pk %}" class="btn btn-outline btn-xs">编辑</a></td>
</tr>
{% endfor %}
</tbody></table></div></div>
{% endblock %}
