{% extends 'base.html' %}
{% block title %}系统配置{% endblock %}
{% block content %}
<div class="page-header"><h1><i class="bi bi-sliders"></i> 系统配置</h1></div>
<div class="card"><div class="card-header">配置列表 <button class="btn btn-primary btn-sm" onclick="document.getElementById('configModal').style.display='flex'"><i class="bi bi-plus"></i> 添加</button></div>
<div class="card-body" style="padding:0">
<table class="table">
<thead><tr><th>配置键</th><th>配置值</th><th>描述</th><th>更新时间</th></tr></thead>
<tbody>
{% for c in configs %}
<tr><td><code>{{ c.key }}</code></td><td>{{ c.value }}</td><td>{{ c.description }}</td><td>{{ c.updated_at|date:"Y-m-d H:i" }}</td></tr>
{% empty %}
<tr><td colspan="4" style="text-align:center;color:var(--text-light);padding:30px">暂无配置</td></tr>
{% endfor %}
</tbody></table></div></div>

<div id="configModal" class="modal-overlay" style="display:none">
<div class="modal-content">
<h3>添加/修改配置</h3>
<form method="post">{% csrf_token %}
<div class="form-group"><label class="form-label">配置键</label><input name="key" class="form-control" required></div>
<div class="form-group"><label class="form-label">配置值</label><input name="value" class="form-control" required></div>
<div class="form-group"><label class="form-label">描述</label><textarea name="description" class="form-control" rows="2"></textarea></div>
<div style="display:flex;gap:12px"><button type="submit" class="btn btn-primary">保存</button><button type="button" class="btn btn-outline" onclick="document.getElementById('configModal').style.display='none'">取消</button></div>
</form></div></div>
{% endblock %}
